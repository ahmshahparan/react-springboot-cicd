name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  CODEDEPLOY_APP: react-springboot-app
  CODEDEPLOY_GROUP: react-springboot-deployment-group

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Spring Boot backend
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Build React frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Prepare deployment artifacts
        run: |
          mkdir -p deploy_artifacts/backend deploy_artifacts/frontend deploy_artifacts/scripts
          cp backend/target/cicd-backend.jar deploy_artifacts/backend/
          cp backend/Dockerfile deploy_artifacts/backend/
          cp -r frontend/dist deploy_artifacts/frontend/
          cp frontend/Dockerfile deploy_artifacts/frontend/
          cp frontend/nginx.conf deploy_artifacts/frontend/
          cp docker-compose.yml deploy_artifacts/
          cp appspec.yml deploy_artifacts/
          cp -r scripts/ deploy_artifacts/scripts/
          cd deploy_artifacts && zip -r ../deployment.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload artifact to S3
        run: |
          aws s3 cp deployment.zip s3://${{ env.S3_BUCKET }}/deployment.zip

      - name: Trigger CodeDeploy deployment
        run: |
          aws deploy create-deployment \
            --application-name ${{ env.CODEDEPLOY_APP }} \
            --deployment-group-name ${{ env.CODEDEPLOY_GROUP }} \
            --s3-location bucket=${{ env.S3_BUCKET }},key=deployment.zip,bundleType=zip \
            --description "Deployed from GitHub Actions - ${{ github.sha }}"
